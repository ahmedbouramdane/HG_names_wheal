<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYDEX Student Wheel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="flex flex-col h-screen overflow-hidden">

  <canvas id="confetti-canvas"></canvas>

  <header class="sticky-header px-4 py-3">
    <div class="max-w-6xl mx-auto flex items-center gap-4">
      <div class="logo-wrapper">
        <img src="https://lydex-rabat.ma/demo/images/logo.png" alt="LYDEX Logo" onerror="this.style.display='none';document.getElementById('logo-fallback').classList.remove('hidden')">
        <div id="logo-fallback" class="logo-fallback hidden">L</div>
      </div>
      <div>
        <h1 class="title-main">LYDEX Student Wheel</h1>
        <p class="title-sub">History & Geography &mdash; Lydex de Rabat</p>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <button id="fullscreen-btn" class="header-icon-btn" aria-label="Fullscreen" title="Fullscreen">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
        <button id="settings-btn" class="header-icon-btn" aria-label="Settings" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto w-full px-4 py-4 space-y-4 flex-1 flex flex-col min-h-0">

    <section class="class-selector-section">
      <div class="class-selector-inner">
        <div class="class-selector-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          <span>Class</span>
        </div>
        <div id="class-selector" class="class-tabs-wrapper"></div>
      </div>
    </section>

    <div class="main-grid flex-1 min-h-0" id="main-grid">
      <div class="left-panel flex flex-col min-h-0 h-full gap-3">
        <section class="students-section flex flex-col flex-1 min-h-0">
          <div class="students-header">
            <div class="students-header-left">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <span>Students</span>
            </div>
            <span id="student-count" class="student-count-badge">0</span>
            <button id="edit-toggle-btn" class="edit-toggle-btn" aria-label="Toggle edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </button>
          </div>

          <div id="student-list-display" class="student-list-display flex-1 overflow-y-auto pr-2"></div>

          <div id="edit-area" class="edit-area hidden">
            <textarea id="student-input" placeholder="Enter student names separated by commas..."></textarea>
            <div class="edit-actions">
              <button id="done-edit-btn" class="done-btn">Done</button>
            </div>
          </div>
        </section>
      </div>

      <div class="right-panel flex flex-col min-h-0 h-full">
        <section id="wheel-container" class="wheel-section flex flex-col flex-1 min-h-0">
          <div id="empty-state" class="empty-state">
            <div id="empty-state-icon" class="empty-state-icon">🎯</div>
            <h3 id="empty-state-title" class="text-lg font-semibold text-slate-400 mb-1">No Students Yet</h3>
            <p id="empty-state-desc" class="text-sm text-slate-500 text-center max-w-xs">Add student names to start using the wheel.</p>
          </div>
          <div class="wheel-area hidden" id="wheel-area">
            <div class="wheel-canvas-wrapper">
              <div class="wheel-pointer"></div>
              <canvas id="wheel-canvas"></canvas>
              <div class="spin-btn-wrapper">
                <button id="spin-btn" class="spin-btn" aria-label="Spin the wheel">SPIN</button>
              </div>
            </div>
          </div>
        </section>
      </div>

    </div>
  </main>

  <footer class="site-footer flex-shrink-0">
    <div class="footer-inner">
      <span>LYDEX de Rabat &mdash; History & Geography</span>
      <span class="footer-dot">•</span>
      <span>developed by <b>Ahmed BOURAMDANE</b></span>
      <span class="footer-dot">•</span>
      <span>&copy; 2026</span>
    </div>
  </footer>

  <!-- Floating Action Button: سؤال عشوائي مباشر -->
  <button id="random-q-btn" class="random-q-fab" aria-label="سؤال عشوائي مباشر" title="سؤال عشوائي مباشر">
    <span class="fab-glow"></span>
    <span class="fab-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </span>
    <span class="fab-label">سؤال عشوائي مباشر</span>
  </button>

  <script src="storage.js"></script>
  <script src="wheel.js"></script>
  <script src="app.js"></script>
</body>
</html>
